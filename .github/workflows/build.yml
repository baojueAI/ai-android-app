name: Build Android

# 串行化：新推送排队等待，不取消正在运行/排队的构建（避免被并发触发 cancel）
concurrency:
  group: android-build
  cancel-in-progress: false

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 不使用 git submodule（本地无法稳定初始化），改为显式 clone 指定 tag 的原生依赖。
# 不使用 ./gradlew（仓库缺 Unix 版 gradlew 脚本），改用 gradle/actions/setup-gradle 直接装 Gradle 8.5。

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch native deps (llama.cpp / whisper.cpp)
        run: |
          for i in 1 2 3; do
            git clone --depth 1 --branch b3975 https://github.com/ggerganov/llama.cpp.git app/src/main/cpp/third-party/llama.cpp && break
            echo "llama.cpp clone failed (attempt $i), retrying..."; sleep 5
          done
          for i in 1 2 3; do
            git clone --depth 1 --branch v1.6.1 https://github.com/ggerganov/whisper.cpp.git app/src/main/cpp/third-party/whisper.cpp && break
            echo "whisper.cpp clone failed (attempt $i), retrying..."; sleep 5
          done
          echo "=== verify ==="
          test -f app/src/main/cpp/third-party/llama.cpp/CMakeLists.txt && echo "llama.cpp OK" || (echo "llama.cpp MISSING"; exit 1)
          test -f app/src/main/cpp/third-party/whisper.cpp/CMakeLists.txt && echo "whisper.cpp OK" || (echo "whisper.cpp MISSING"; exit 1)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Assemble Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  build-release:
    name: Build Release APK (签名)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch native deps (llama.cpp / whisper.cpp)
        run: |
          for i in 1 2 3; do
            git clone --depth 1 --branch b3975 https://github.com/ggerganov/llama.cpp.git app/src/main/cpp/third-party/llama.cpp && break
            echo "llama.cpp clone failed (attempt $i), retrying..."; sleep 5
          done
          for i in 1 2 3; do
            git clone --depth 1 --branch v1.6.1 https://github.com/ggerganov/whisper.cpp.git app/src/main/cpp/third-party/whisper.cpp && break
            echo "whisper.cpp clone failed (attempt $i), retrying..."; sleep 5
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release-key.jks

      - name: Assemble Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
